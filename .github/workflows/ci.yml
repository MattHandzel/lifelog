name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: nix develop --command cargo fmt -- --check

      - name: Cargo check
        run: nix develop --command cargo check --all-targets

      - name: Clippy lints
        run: nix develop --command cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: nix develop --command cargo nextest run --all-targets

  integration-tests:
    runs-on: ubuntu-latest
    needs: validate-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres createuser --superuser runner || true
          sudo -u postgres createdb lifelog || true

      - name: Run integration tests
        timeout-minutes: 10
        env:
          LIFELOG_POSTGRES_INGEST_URL: "postgres://runner@localhost/lifelog"
          LIFELOG_ALLOW_PLAINTEXT: "1"
        run: |
          nix develop --command cargo test -p lifelog-server --test validation_suite -- --nocapture --include-ignored
          nix develop --command cargo test -p lifelog-server --test multi_device -- --nocapture --include-ignored
          nix develop --command cargo test -p lifelog-server --test sync_scenarios -- --nocapture --include-ignored

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: /tmp/lifelog-test-*

  validate-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install protobuf tesseract

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test --all-targets
