name: cargo-audit

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit
