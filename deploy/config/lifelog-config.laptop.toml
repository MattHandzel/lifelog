[runtime]
collectorId = "laptop"

[collectors.laptop]
host = "127.0.0.1"
port = 7190
timestampFormat = "%Y-%m-%d_%H-%M-%S%.3f%Z"

[collectors.laptop.browser]
enabled = true
inputFile = "~/.config/google-chrome/Default/History"
outputFile = "~/lifelog/data/browser/last_query_chrome_micros.txt"
browserType = "chrome"

[collectors.laptop.screen]
enabled = true
interval = 30.0
outputDir = "~/lifelog/data/screen"
program = "grim"
timestampFormat = "%Y-%m-%d_%H-%M-%S%.3f%Z"

[collectors.laptop.camera]
enabled = false
interval = 10.0
outputDir = "~/lifelog/data/camera"
device = "/dev/video0"
resolutionX = 640
resolutionY = 480
fps = 30
timestampFormat = "%Y-%m-%d_%H-%M-%S%.3f%Z"

[collectors.laptop.microphone]
enabled = false
outputDir = "~/lifelog/data/microphone"
sampleRate = 44100
chunkDurationSecs = 300
timestampFormat = "%Y-%m-%d_%H-%M-%S%.3f%Z"
bitsPerSample = 16
channels = 2
captureIntervalSecs = 300

[collectors.laptop.processes]
enabled = true
interval = 60.0
outputDir = "~/lifelog/data/processes"

[collectors.laptop.hyprland]
enabled = false
interval = 1.0
outputDir = "~/lifelog/data/hyprland"
logClients = true
logActivewindow = true
logWorkspace = true
logActiveMonitor = true
logDevices = true

[collectors.laptop.keyboard]
enabled = true
interval = 1.0
outputDir = "~/lifelog/data/keystrokes"

[server]
host = "0.0.0.0"
port = 7182
databaseEndpoint = "127.0.0.1:7183"
databaseName = "main"
serverName = "LifelogServer"
casPath = "~/lifelog/cas"
defaultCorrelationWindowMs = 30000

transforms = [
  { id = "ocr", enabled = true, sourceOrigin = "*:screen", language = "eng" }
]

[deviceAliases]
"44A3BB2C216C" = "laptop"
