[server]
host = "0.0.0.0"
port = 7182
databaseEndpoint = "postgresql://lifelog@100.118.206.104:5432/lifelog"
serverName = "LifelogServer"
casPath = "/home/matth/lifelog/cas"
defaultCorrelationWindowMs = 30000

[collectors.matts-laptop]
host = "100.118.206.104"
id = "matts-laptop"
port = 7190
timestampFormat = "%Y-%m-%d_%H-%M-%S.%3f%Z"

[collectors.matts-laptop.screen]
enabled = true
interval = 10.0
outputDir = "/home/matth/lifelog/data/screen"
program = "grim"

[collectors.matts-laptop.browser]
enabled = true
inputFile = "~/.config/google-chrome/Default/History"
outputFile = "~/lifelog/data/browser/last_query_chrome_micros.txt"
browserType = "chrome"

[collectors.matts-laptop.camera]
enabled = false
interval = 10.0
outputDir = "~/lifelog/data/camera"
device = "/dev/video0"
resolutionX = 640
resolutionY = 480
fps = 30
timestampFormat = "%Y-%m-%d_%H-%M-%S.%3f%Z"

[collectors.matts-laptop.microphone]
enabled = true
outputDir = "~/lifelog/data/microphone"
sampleRate = 16000
chunkDurationSecs = 300
timestampFormat = "%Y-%m-%d_%H-%M-%S.%3f%Z"
bitsPerSample = 16
channels = 1
captureIntervalSecs = 300

[collectors.matts-laptop.processes]
enabled = true
interval = 60.0
outputDir = "~/lifelog/data/processes"

[collectors.matts-laptop.hyprland]
enabled = true
interval = 5.0
outputDir = "~/lifelog/data/hyprland"
logClients = true
logActivewindow = true
logWorkspace = true
logActiveMonitor = true
logDevices = true

[collectors.matts-laptop.keyboard]
enabled = true
interval = 1.0
outputDir = "~/lifelog/data/keystrokes"

[[transforms]]
id = "ocr"
enabled = true
sourceOrigin = "*:screen"
language = "eng"

[[transforms]]
id = "stt"
enabled = true
transformType = "stt"
sourceOrigin = "*:Audio"
serviceEndpoint = "http://localhost:47770"
priority = 1
[transforms.params]
model = "Systran/faster-whisper-large-v3"

[[transforms]]
id = "llm-cleanup"
enabled = true
transformType = "llm"
sourceOrigin = "*:Transcription"
serviceEndpoint = "http://localhost:11434"
priority = 2
[transforms.params]
model = "gemma3:4b-it-qat"
system_prompt = "Clean up this speech-to-text transcription. Fix grammar, remove filler words, and format into readable paragraphs. Return only the cleaned text."

[[transforms]]
id = "activity-classifier"
enabled = true
transformType = "activity-classifier"
sourceOrigin = "*:Ocr"
serviceEndpoint = "http://localhost:11434"
priority = 3
[transforms.params]
model = "gemma3:4b-it-qat"
